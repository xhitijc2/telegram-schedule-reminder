name: schedule-reminder

on:
  workflow_dispatch:  # triggered externally by cron-job.org every minute
  schedule:
    - cron: '*/5 * * * *'  # fallback: also run every 5 min in case external trigger fails

concurrency:
  group: reminder
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run reminder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reminder.py
